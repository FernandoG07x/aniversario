<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>El 6 de cada mes</title>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <audio id="miMusica" loop>
        <source src="musica.mp3" type="audio/mpeg">
    </audio>

    <div class="main-container">
        <h1 class="titulo">El dia 6 de cada mes...</h1>
        <p class="subtitulo">Es Memoria y Gratitud.</p>
        
        <button id="btnMusica" onclick="toggleMusica()">🎵 Toca para música</button>

        <div class="image-section">
            <div class="album-container">
                <div class="album-wrapper">
                    <img src="foto1.jpg" class="foto-pareja">
                    <img src="foto2.jpeg" class="foto-pareja">
                    <img src="foto3.jpeg" class="foto-pareja">
                    <img src="foto4.jpeg" class="foto-pareja">
                    <img src="foto5.jpeg" class="foto-pareja">
                    <img src="foto6.jpeg" class="foto-pareja">
                </div>
            </div>
            <div id="mariposas-container"></div>
        </div>
        
        <div class="text-section">
            <p>Gracias por cada momento compartido y por ser parte de mi camino.</p>
            <p class="aniversario">¡Feliz aniversario!</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
