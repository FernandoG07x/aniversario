<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>El 6 de cada mes</title>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="particles-container"></div>

    <audio id="miMusica" loop></audio>

    <div class="main-container">
        <div class="glass-card">
            <header>
                <h1 class="titulo-animado">El día 6 de cada mes...</h1>
                <p class="subtitulo">Es Memoria y Gratitud</p>
            </header>

            <div class="music-player">
                <button id="btnMusica" onclick="toggleMenu()" class="floating-btn">
                    <span id="music-icon">❄️</span>
                    <span id="music-text">Elegir nuestra música</span>
                </button>
                
                <div id="lista-musica" class="music-list hidden">
                    <div class="track" onclick="seleccionarMusica('Musica/musica1.mp3', 'El inicio de Nuestra Historia')">🎵 Canción 1</div>
                    <div class="track" onclick="seleccionarMusica('Musica/musica2.mp3', 'Momento Mágico')">🎵 Canción 2</div>
                    <div class="track" onclick="seleccionarMusica('Musica/musica3.mp3', 'Te Amo')">🎵 Canción 3</div>
                    <div class="track" onclick="seleccionarMusica('Musica/musica4.mp3', 'Nuestra Historia')">🎵 Canción 4</div>
                    <div class="track" onclick="seleccionarMusica('Musica/musica5.mp3', 'Siempre Juntos')">🎵 Canción 5</div>
                </div>
            </div>

            <div class="image-section">
                <div class="album-container">
                    <div class="album-wrapper" id="contenedor-fotos"></div>
                </div>
            </div>
            
            <div class="text-section">
                <p class="mensaje-final">Gracias por cada momento compartido y por ser parte de mi camino.</p>
                <h2 class="aniversario-glow">¡Feliz Aniversario!</h2>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
